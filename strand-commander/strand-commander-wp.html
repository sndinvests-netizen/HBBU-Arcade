<!-- ═══════════════════════════════════════════════════════
     STRAND COMMANDER – HBBU Arcade
     WordPress embed — paste into a Custom HTML block.
     The game runs on GitHub Pages; this is just the frame.
═══════════════════════════════════════════════════════ -->

<style>
#hbbu-sc-wrap {
  width: 100%;
  max-width: 580px;
  margin: 0 auto;
  display: block;
}
#hbbu-sc-frame {
  width: 100%;
  height: 900px;
  border: none;
  display: block;
  transition: height 0.1s ease;
}
</style>

<div id="hbbu-sc-wrap">
  <iframe
    id="hbbu-sc-frame"
    src="https://sndinverts-netizen.github.io/HBBU-Arcade/strand-commander/"
    title="Strand Commander – HBBU Arcade"
    allow="autoplay"
    scrolling="no">
  </iframe>
</div>

<script>
// Auto-resize iframe height when the game reports its scaled size
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'hbbu-resize') {
    var f = document.getElementById('hbbu-sc-frame');
    if (f) f.style.height = (e.data.height + 16) + 'px';
  }
});
</script>
